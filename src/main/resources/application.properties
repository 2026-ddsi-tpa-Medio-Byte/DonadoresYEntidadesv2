spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

server.port=${PORT:8080}
server.address=0.0.0.0

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

springdoc.swagger-ui.path=/swagger-ui.html

donaciones.url=${DONACIONES_URL:http://localhost:8081}
incentivos.url=${INCENTIVOS_URL:http://localhost:8083}

# ── Métricas Datadog ──────────────────────────────────────
management.datadog.metrics.export.api-key=${DATADOG_API_KEY:local-no-key}
management.datadog.metrics.export.application-key=${DATADOG_APP_KEY:local-app-key}
management.datadog.metrics.export.uri=https://api.us5.datadoghq.com
management.datadog.metrics.export.step=10s
management.datadog.metrics.export.enabled=true
management.metrics.tags.app=donadores-y-entidades
management.metrics.tags.env=${APP_ENV:local}